apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: todo-app-backend-route
spec:
  parentRefs:
  - name: $(TODO_APP_GATEWAY_NAME)
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/todos
    backendRefs:
    - name: $(TODO_APP_BACKEND_SERVICE_NAME)
      port: 80
